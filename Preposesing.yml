name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  schedule:
    # Run setiap hari pukul 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn
    
    - name: Run preprocessing script
      run: |
        echo "=========================================="
        echo "Starting Data Preprocessing Workflow"
        echo "=========================================="
        python automate_Nama-siswa.py
        echo "=========================================="
        echo "Preprocessing completed!"
        echo "=========================================="
    
    - name: Verify output file
      run: |
        if [ -f preprocessed_corn_data.csv ]; then
          echo "✓ Preprocessed file created successfully"
          ls -lh preprocessed_corn_data.csv
          wc -l preprocessed_corn_data.csv
        else
          echo "✗ Error: Preprocessed file not found"
          exit 1
        fi
    
    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Commit and push changes
      run: |
        git add preprocessed_corn_data.csv
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Auto-update preprocessed data [$(date +'%Y-%m-%d %H:%M:%S UTC')]"
          git push
          echo "✓ Changes committed and pushed successfully"
        fi
    
    - name: Workflow Summary
      if: always()
      run: |
        echo ""
        echo "======== Workflow Summary ========"
        echo "Job Status: ${{ job.status }}"
        echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "===================================="
